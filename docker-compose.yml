version: '3.8'

services:
  yangyang-stock:
    build: .
    container_name: yangyang-stock-monitor
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # 持久化 data 目录（不然容器重启 data 就清空了，丢失本地重算结果）
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
